services:
  postgres:
    image: postgres:16-alpine
    container_name: apu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kimi_claw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.17.4
    container_name: apu-directus
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      KEY: local-key-change-in-production
      SECRET: local-secret-change-in-production
      ADMIN_EMAIL: admin@sccr.id
      ADMIN_PASSWORD: admin12345
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: kimi_claw
      DB_USER: postgres
      DB_PASSWORD: postgres
      WEBSOCKETS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions: